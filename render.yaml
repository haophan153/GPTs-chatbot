services:
  - type: web
    name: gpts-chatbot
    runtime: docker
    repo: https://github.com/<YOUR_GITHUB_USERNAME>/gpts-chatbot
    dockerfilePath: ./Dockerfile
    healthCheckPath: /
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        fromService:
          type: web
          name: gpts-chatbot
          envVarKey: RENDER_EXTERNAL_URL
          format: url
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: gpts-db
          property: host
      - key: DB_PORT
        value: "5432"
      - key: DB_DATABASE
        fromDatabase:
          name: gpts-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: gpts-db
          property: username
      - key: DB_PASSWORD
        fromDatabase:
          name: gpts-db
          property: password
      - key: QUEUE_CONNECTION
        value: database
      - key: SESSION_DRIVER
        value: database
      - key: CACHE_STORE
        value: database
      - key: BROADCAST_CONNECTION
        value: log
      - key: LOG_CHANNEL
        value: stack
      - key: LOG_LEVEL
        value: debug

  - type: worker
    name: gpts-chatbot-worker
    runtime: docker
    repo: https://github.com/<YOUR_GITHUB_USERNAME>/gpts-chatbot
    dockerfilePath: ./Dockerfile
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: gpts-db
          property: host
      - key: DB_PORT
        value: "5432"
      - key: DB_DATABASE
        fromDatabase:
          name: gpts-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: gpts-db
          property: username
      - key: DB_PASSWORD
        fromDatabase:
          name: gpts-db
          property: password
      - key: QUEUE_CONNECTION
        value: database
      - key: CACHE_STORE
        value: database
      - key: LOG_CHANNEL
        value: stack
      - key: LOG_LEVEL
        value: debug

databases:
  - name: gpts-db
    plan: free
    databaseName: gpts_chatbot
    ipAllowList: []
